:root {

  --danger: #dc2626;

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'DM Sans', sans-serif; background: var(--offwhite); color: var(--text); min-height: 100vh; -webkit-font-smoothing: antialiased; }

.pitch-stripe { height: 4px; background: repeating-linear-gradient(90deg, var(--pitch) 0px, var(--pitch) 20px, var(--pitch-light) 20px, var(--pitch-light) 40px); }

.site-header { background: var(--pitch-dark); position: sticky; top: 0; z-index: 50; }
.header-inner { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; max-width: 480px; margin: 0 auto; }
.header-logo { font-family: 'Bebas Neue', sans-serif; font-size: 22px; color: var(--gold); letter-spacing: 1px; line-height: 1; }

.session-name { font-size: 13px; font-weight: 500; color: rgba(255,255,255,0.85); }
.btn-logout { background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.2); color: #fff; font-size: 12px; padding: 4px 10px; border-radius: 20px; cursor: pointer; font-family: 'DM Sans', sans-serif; font-weight: 500; }
.btn-logout:hover { background: rgba(255,255,255,0.2); }

.nav-tabs { background: var(--pitch-dark); border-bottom: 1px solid rgba(255,255,255,0.08); }
.nav-inner { display: flex; max-width: 480px; margin: 0 auto; padding: 0 8px; }

.nav-tab.active { color: var(--gold); border-bottom-color: var(--gold); }
.nav-tab:hover:not(.active) { color: rgba(255,255,255,0.8); }

.main { max-width: 480px; margin: 0 auto; padding: 16px; }

.card { background: var(--card); border-radius: var(--radius); border: 1px solid var(--border); box-shadow: var(--shadow); margin-bottom: 12px; overflow: hidden; }
.card-header { padding: 12px 14px 8px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
.card-title { font-family: 'Bebas Neue', sans-serif; font-size: 15px; letter-spacing: 0.8px; color: var(--pitch-dark); display: flex; align-items: center; gap: 6px; }
.group-pill { background: var(--pitch-dark); color: var(--gold); font-family: 'Bebas Neue', sans-serif; font-size: 13px; letter-spacing: 0.5px; padding: 2px 8px; border-radius: 4px; }
.card-body { padding: 8px 14px; }

.fixture { display: grid; grid-template-columns: 1fr auto auto auto; gap: 6px; align-items: center; padding: 7px 0; border-bottom: 1px solid var(--border); }
.fixture:last-child { border-bottom: none; }
.fixture-teams { font-size: 12px; font-weight: 500; }
.fixture-meta { font-size: 11px; color: var(--text-muted); display: flex; align-items: center; gap: 4px; margin-top: 1px; }
.status-dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }
.dot-open { background: #22c55e; } .dot-locked { background: var(--warning); }
.dot-live { background: #ef4444; animation: pulse 1s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} } .dot-done { background: var(--text-light); }

.pick-btn { padding: 5px 0; width: 60px; border: 1.5px solid var(--border-strong); background: var(--white); border-radius: 6px; cursor: pointer; font-size: 10px; font-weight: 500; color: var(--text-muted); font-family: 'DM Sans', sans-serif; text-align: center; transition: none; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.pick-btn:hover:not(.locked) { border-color: var(--pitch); color: var(--pitch); background: #f0fdf4; }
.pick-btn.selected { background: var(--pitch-dark); border-color: var(--pitch-dark); color: #fff; font-weight: 600; }
.pick-btn.selected.correct { background: var(--success); border-color: var(--success); color: #fff; }
.pick-btn.selected.wrong { background: var(--danger); border-color: var(--danger); color: #fff; }
.pick-btn.locked { opacity: 0.5; cursor: default; }

.progress-wrap { padding: 0 14px 12px; }
.progress-labels { display: flex; justify-content: space-between; font-size: 11px; color: var(--text-muted); margin-bottom: 5px; }
.progress-track { height: 5px; background: var(--border); border-radius: 3px; overflow: hidden; }
.progress-fill { height: 100%; background: linear-gradient(90deg, var(--pitch) 0%, var(--pitch-light) 100%); border-radius: 3px; transition: width 0.3s ease; }

.bonus-row { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 1px solid var(--border); }
.bonus-row:last-child { border-bottom: none; }
.bonus-icon { font-size: 18px; flex-shrink: 0; }
.bonus-label { font-size: 13px; font-weight: 500; flex: 1; }
.bonus-input { width: 150px; padding: 5px 8px; border: 1.5px solid var(--border-strong); border-radius: var(--radius-sm); font-size: 12px; font-family: 'DM Sans', sans-serif; color: var(--text); background: var(--white); }
.bonus-input:focus { outline: none; border-color: var(--pitch); }
.bonus-input:disabled { opacity: 0.5; background: var(--offwhite); cursor: default; }

.lb-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 12px; }
.stat-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 10px 8px; text-align: center; box-shadow: var(--shadow); }
.stat-val { font-family: 'Bebas Neue', sans-serif; font-size: 22px; color: var(--pitch-dark); letter-spacing: 0.5px; line-height: 1; }
.stat-lbl { font-size: 10px; color: var(--text-muted); margin-top: 3px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.3px; }

.lb-table { width: 100%; border-collapse: collapse; }
.lb-table th { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.4px; color: var(--text-muted); padding: 6px 8px; text-align: center; border-bottom: 1px solid var(--border); }
.lb-table th:nth-child(2) { text-align: left; }
.lb-table td { padding: 9px 8px; font-size: 13px; text-align: center; border-bottom: 1px solid var(--border); }
.lb-table tr:last-child td { border-bottom: none; }
.lb-table td:nth-child(2) { text-align: left; font-weight: 500; }
.lb-pts { font-weight: 700; font-size: 15px; color: var(--pitch-dark); }
.lb-muted { color: var(--text-muted); font-size: 12px; }

.auth-wrap { max-width: 360px; margin: 24px auto 0; }
.auth-hero { background: var(--pitch-dark); border-radius: var(--radius); padding: 24px 20px; text-align: center; margin-bottom: 16px; position: relative; overflow: hidden; }
.auth-hero::before { content: ''; position: absolute; inset: 0; background: repeating-linear-gradient(90deg, transparent, transparent 40px, rgba(255,255,255,0.015) 40px, rgba(255,255,255,0.015) 41px); }

.auth-subtitle { font-size: 12px; color: rgba(255,255,255,0.55); margin-top: 4px; text-transform: uppercase; letter-spacing: 1.5px; position: relative; }

.form-field { margin-bottom: 14px; }
.form-label { display: block; font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.4px; color: var(--text-muted); margin-bottom: 5px; }
.form-select, .form-input { width: 100%; padding: 11px 13px; border: 1.5px solid var(--border-strong); border-radius: var(--radius-sm); font-size: 14px; font-family: 'DM Sans', sans-serif; color: var(--text); background: var(--card); appearance: none; }

</div>
<main class="main" id="main-content">
  <div id="view-login" class="section active">
    <div class="auth-wrap">
      <div class="auth-hero">
        <div class="auth-title">SWEEPSTAKE</div>
        <div class="auth-subtitle">World Cup 2026 · USA / Canada / Mexico</div>
      </div>
      <div class="card"><div class="card-body" style="padding:16px">
        <div class="form-field">
          <label class="form-label">Your name</label>
          <input class="form-input" type="text" id="login-player" placeholder="Enter your name..." autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" maxlength="20">
        </div>
        <div class="form-field">
          <label class="form-label">PIN</label>
          <input class="form-input" type="password" id="login-pin-single" inputmode="numeric" maxlength="4" placeholder="Enter PIN" style="font-size:22px;letter-spacing:10px;text-align:center" oninput="this.value=this.value.replace(/[^0-9]/g,'').slice(0,4)">
        </div>
        <div id="login-err"></div>
        <button class="btn-main gold" id="login-btn" onclick="doLogin()">Log in</button>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px;padding-top:12px;border-top:1px solid var(--border)">
          <div style="font-size:12px;color:var(--text-muted);text-align:center;margin-bottom:8px">First time here?</div>
          <button class="btn-main" style="background:var(--pitch-dark);font-size:15px;padding:13px;width:100%" onclick="showView('register')">✏️ New player? Register here</button>
        </div>
      </div></div>
    </div>
  </div>

  <div id="view-register" class="section">
    <div class="auth-wrap">
      <div class="auth-hero">
        <div class="auth-title">REGISTER</div>
        <div class="auth-subtitle">Choose your PIN — don't forget it</div>
      </div>
      <div class="card"><div class="card-body" style="padding:16px">
        <div class="form-field">
          <label class="form-label">Your name</label>
          <select class="form-select" id="reg-player"></select>
        </div>
        <div class="form-field">
          <label class="form-label">Choose a PIN</label>
          <input class="form-input" type="password" id="reg-pin-single" inputmode="numeric" maxlength="4" placeholder="Enter PIN" style="font-size:22px;letter-spacing:10px;text-align:center" oninput="this.value=this.value.replace(/[^0-9]/g,'').slice(0,4)">
        </div>
        <div class="form-field">
          <label class="form-label">Confirm PIN</label>
          <input class="form-input" type="password" id="conf-pin-single" inputmode="numeric" maxlength="4" placeholder="Enter PIN" style="font-size:22px;letter-spacing:10px;text-align:center" oninput="this.value=this.value.replace(/[^0-9]/g,'').slice(0,4)">
        </div>
        <div id="reg-err"></div>
        <button class="btn-main gold" id="reg-btn" onclick="doRegister()">Set PIN &amp; continue</button>
        <p class="auth-link" style="margin-top:12px"><a href="#" onclick="showView('login');return false">Back to login</a></p>
      </div></div>
    </div>
  </div>

  <div id="view-picks" class="section"></div>
  <div id="view-knockout" class="section"></div>
  <div id="view-leaderboard" class="section"></div>
  <div id="view-rules" class="section"></div>
  <div id="view-admin" class="section"></div>
</main>

// ── Firebase helpers ──────────────────────────────────────────────────────
async function fbGet(path) {
  const snap = await db.ref(path).get();
  return snap.exists() ? snap.val() : null;
}
async function fbSet(path, val) {
  await db.ref(path).set(val);
}
function fbListen(path, cb) {
  db.ref(path).on('value', snap => cb(snap.exists() ? snap.val() : null));
}

// ── init ──────────────────────────────────────────────────────────────────
async function init() {
  // load full DB snapshot once, then listen for results changes (for live leaderboard)
  const [pins, picks, bonuses, results, paid, ko, adminMsg] = await Promise.all([
    fbGet('pins'), fbGet('picks'), fbGet('bonuses'), fbGet('results'), fbGet('paid'), fbGet('knockout'), fbGet('adminMessage')
  ]);
  DB.pins         = pins    || {};
  DB.picks        = picks   || {};
  DB.bonuses      = bonuses || {};
  DB.results      = results || {};
  DB.paid         = paid    || {};
  DB.knockout     = normaliseKnockoutWildcards(ko || {});
  DB.adminMessage = adminMsg || '';
}

function getCountdownBanner() {
  const now = new Date();
  // All deadlines with labels
  const deadlines = [
    { dt: new Date("2026-06-11T19:00:00Z"), label: 'All picks lock', time: '11 Jun 20:00' },
    { dt: new Date("2026-06-28T18:00:00Z"), label: 'R16 picks lock', time: '28 Jun 20:00' },
    { dt: new Date("2026-07-04T16:00:00Z"), label: 'QF picks lock',  time: '4 Jul 18:00'  },
    { dt: new Date("2026-07-09T19:00:00Z"), label: 'SF picks lock',  time: '9 Jul 21:00'  },
    { dt: new Date("2026-07-14T19:00:00Z"), label: 'Final picks lock', time: '14 Jul 23:00' },
  ];
  // Find next upcoming deadline
  const next = deadlines.find(d => now < d.dt);
  if(!next) return '';
  const diff = next.dt - now;
  const days = Math.floor(diff/86400000);
  const hrs  = Math.floor((diff%86400000)/3600000);
  const mins = Math.floor((diff%3600000)/60000);
  let bg, color, border, emoji;
  if(days >= 3) { bg='#f0fdf4'; color='var(--success)'; border='#bbf7d0'; emoji='🟢'; }
  else if(days >= 1) { bg='#fff7ed'; color='#c2410c'; border='#fed7aa'; emoji='🟡'; }
  else { bg='#fef2f2'; color='var(--danger)'; border='#fecaca'; emoji='🔴'; }
  let txt;
  if(days > 0) txt = `${days} day${days>1?'s':''} ${hrs}hr${hrs!==1?'s':''} left`;
  else if(hrs > 0) txt = `${hrs} hour${hrs!==1?'s':''} ${mins} min${mins!==1?'s':''} left`;
  else txt = `Under 1 hour left — act NOW!`;
  return `<div style="background:${bg};border:2px solid ${border};border-radius:var(--radius-sm);padding:12px 16px;margin-bottom:12px;display:flex;align-items:center;gap:10px">
    <span style="font-size:20px">${emoji}</span>
    <div>
      <div style="font-size:14px;font-weight:700;color:${color}">${next.label} — ${txt}</div>
      <div style="font-size:11px;color:${color};opacity:0.8;margin-top:2px">Deadline: ${next.time.replace(' BST','')}</div>
    </div>
  </div>`;
}

// look up player data trying all possible key formats - exact, underscore, space,
// and finally a case/whitespace-insensitive scan across all keys in the store
function lookupPlayer(store, player) {
  if(!store) return {};
  const underscoreKey = player.replace(/[^a-zA-Z0-9]/g,'_');
  const spaceKey = player.replace(/_/g,' ');
  if(store[player]) return store[player];
  if(store[underscoreKey]) return store[underscoreKey];
  if(store[spaceKey]) return store[spaceKey];
  // fallback: case/whitespace-insensitive match against every key
  const norm = s => s.toLowerCase().replace(/[^a-z0-9]/g,'');
  const targetNorm = norm(player);
  const matchKey = Object.keys(store).find(k => norm(k) === targetNorm);
  return matchKey ? store[matchKey] : {};
}

function calcScore(player) {
  let pts=0, correct=0, total=0;
  const playerPicks = lookupPlayer(DB.picks, player);
  for(const fx of FIXTURES) {
    const res  = DB.results[fx.id];
    const pick = playerPicks[fx.id];
    if(!res || !pick) continue;
    total++;
    if(res==='draw' && pick==='draw')   { pts+=2; correct++; }
    else if(res!=='draw' && pick===res) { pts+=1; correct++; }
  }
  const pb = lookupPlayer(DB.bonuses, player);
  const rb = DB.results._bonuses||{};
  // strip country in brackets for comparison e.g. "Harry Kane (England)" -> "harry kane"
  const norm = s => s ? s.toLowerCase().trim().replace(/\s*\([^)]*\)/g,'').trim() : '';
  const gotWinner = !!(rb && rb.winner && pb.winner && norm(rb.winner)===norm(pb.winner));
  const gotBoot   = !!(rb && rb.boot   && pb.boot   && norm(rb.boot)===norm(pb.boot));
  const gotBall   = !!(rb && rb.ball   && pb.ball   && norm(rb.ball)===norm(pb.ball));
  if(gotWinner) pts+=5;
  if(gotBoot)   pts+=5;
  if(gotBall)   pts+=5;

  // knockout points
  const koPicks = lookupPlayer(DB.knockout, player);
  const koResults = (DB.knockout._results) || {};
  let koCorrect = 0;

  // wildcard picks
  const qualResults = koResults._qual || {};
  const myWildcards = koPicks._wildcards || {};
  // qualResults keys stored with underscores; wildcard pick keys also stored with underscores
  const normKey = s => s ? s.replace(/[^a-zA-Z0-9]/g,'_').replace(/__+/g,'_') : '';
  Object.entries(myWildcards).forEach(([team, picked]) => {
    if(!picked) return;
    const matched = qualResults[team] ||
      Object.entries(qualResults).some(([qk, qv]) => qv && normKey(qk) === normKey(team));
    if(matched) { pts += 1; koCorrect++; }
  });
  // round by round team picks - 1pt each correct team
  const qualified = DB.knockout._qualified || {};
  for(const rk of ROUND_KEYS) {
    const myRoundPicks = koPicks[rk] || {};
    const roundQualified = qualified[rk] || {};
    Object.entries(myRoundPicks).forEach(([team, picked]) => {
      if(picked && roundQualified[team]) { pts += 1; koCorrect++; }
    });
  }

  const groupPts = pts - (gotWinner?5:0) - (gotBoot?5:0) - (gotBall?5:0) - koCorrect;
  return {pts, correct, total, gotWinner, gotBoot, gotBall, koCorrect, groupPts};
}

window.doLogin = async function() {
  const player = document.getElementById('login-player').value.trim();
  const pin    = getPin('login-pin');
  const errEl  = document.getElementById('login-err');
  const btn    = document.getElementById('login-btn');
  errEl.innerHTML = '';
  if(pin.length !== 4) { errEl.innerHTML='<div class="alert alert-danger">Enter all 4 digits.</div>'; return; }

  if(!player || player.length < 2) { errEl.innerHTML='<div class="alert alert-danger">Enter your name.</div>'; return; }
  if(player.toLowerCase() === 'admin') {
    if(pin === ADMIN_PIN) { session={player:'Admin',isAdmin:true}; purgeStaleWildcardFalseValues(); showApp(); return; }
    errEl.innerHTML='<div class="alert alert-danger">Wrong admin PIN.</div>'; clearPin('login-pin'); return;
  }

  btn.disabled = true; btn.textContent = 'Checking…';
  // case and space insensitive match - find the actual stored key
  const allPins = await fbGet('pins') || {};
  const matchedKey = Object.keys(allPins).find(k =>
    k.replace(/_/g,' ').toLowerCase().trim() === player.toLowerCase().trim()
  );
  btn.disabled = false; btn.textContent = 'Log in';

  if(!matchedKey) {
    btn.disabled = false; btn.textContent = 'Log in';
    errEl.innerHTML='<div class="alert alert-danger">Name not recognised — check your spelling or <a href="#" onclick="showView(\'register\');return false">register here</a> if you\'re new.</div>'; return;
  }
  const storedPin = allPins[matchedKey];
  if(storedPin !== pin) {
    errEl.innerHTML='<div class="alert alert-danger">Wrong PIN.</div>'; clearPin('login-pin'); return;
  }
  // use the canonical stored name so everything matches Firebase keys
  const canonicalPlayer = matchedKey.replace(/_/g,' ');
  session = {player: canonicalPlayer, isAdmin:false};
  DB.picks[canonicalPlayer]   = await fbGet(`picks/${matchedKey}`) || {};
  DB.bonuses[canonicalPlayer] = await fbGet(`bonuses/${matchedKey}`) || {};
  // Load knockout picks for this player and normalise wildcard keys
  const koLogin = await fbGet(`knockout/${matchedKey}`) || {};
  if(koLogin._wildcards) {
    const allTeams = Object.values(ALL_TEAMS_BY_GROUP).flat();
    const remapped = {};
    Object.entries(koLogin._wildcards).forEach(([fbKey, val]) => {
      if(!val) return; // strip false values - old code wrote false on deselect
      const match = allTeams.find(t =>
        t.replace(/[.$#[\]/]/g,'_') === fbKey ||
        t.replace(/[^a-zA-Z0-9]/g,'_') === fbKey
      ) || fbKey;
      remapped[match] = val;
    });
    koLogin._wildcards = remapped;
  }
  if(!DB.knockout) DB.knockout = {};
  DB.knockout[canonicalPlayer] = koLogin;
  DB.knockout[matchedKey] = koLogin;
  showApp();
  // Re-render picks tab now knockout data is loaded so nudge banner is accurate
  if(activeTab === 'picks') renderPicks();
};

window.doRegister = async function() {
  // hard lock - no new registrations after first kick-off
  if(new Date() >= new Date("2026-06-11T20:00:00Z")) {
    document.getElementById('reg-err').innerHTML = '<div class="alert alert-danger">Registration is closed — picks locked at 11 June 20:00 BST. Speak to Jacob if you think this is an error.</div>';
    return;
  }
  const player = document.getElementById('reg-player').value.trim();
  const pin    = getPin('reg-pin');
  const conf   = getPin('conf-pin');
  const errEl  = document.getElementById('reg-err');
  const btn    = document.getElementById('reg-btn');
  errEl.innerHTML = '';
  if(!player || player.length < 2) { errEl.innerHTML='<div class="alert alert-danger">Enter your name (at least 2 characters).</div>'; return; }
  if(pin.length !== 4)        { errEl.innerHTML='<div class="alert alert-danger">Enter all 4 digits.</div>'; return; }
  if(pin !== conf)             { errEl.innerHTML='<div class="alert alert-danger">PINs don\'t match.</div>'; clearPin('conf-pin'); return; }

  btn.disabled = true; btn.textContent = 'Saving…';
  const key = player.replace(/[^a-zA-Z0-9]/g,'_');
  const existing = await fbGet(`pins/${key}`);
  if(existing) {
    btn.disabled=false; btn.textContent='Set PIN & continue';
    errEl.innerHTML='<div class="alert alert-danger">Already registered — log in instead.</div>'; return;
  }
  await fbSet(`pins/${key}`, pin);
  DB.pins[player] = pin;
  btn.disabled=false; btn.textContent='Set PIN & continue';
  session = {player, isAdmin:false};
  DB.picks[player]   = {};
  DB.bonuses[player] = {};
  populateSelects();
  showApp();
};

  let html = '';

  }

  if(done === total && koDataForNudge && validWildcardCount < 8 && !tourneyLive) {

      <div>

        <div style="font-size:11px;color:#9a3412;margin-top:2px">Head to the Knockouts tab to pick your 8 wildcard teams</div>
      </div>
      <button onclick="switchTab('knockout')" style="background:#ea580c;color:#fff;border:none;border-radius:6px;padding:8px 12px;font-size:12px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;white-space:nowrap">Go →</button>
    </div>`;
  }

  html += `<div class="card">
    <div class="card-header"><div class="card-title">⭐ Bonus picks</div>
    <span style="font-size:11px;color:var(--text-muted)">Locks 11 Jun 20:00 · +5 pts each</span></div>
    <div class="card-body">
      <div class="bonus-row">
        <span class="bonus-icon">👟</span>
        <span class="bonus-label">Golden boot</span>

          <select class="bonus-input" ${tourneyLocked?'disabled':''} onchange="handleBootSelect(this.value)">
            <option value="">Pick scorer...</option>
            ${BOOT_PLAYERS.map(pl=>`<option value="${pl}" ${pb.boot===pl?'selected':''}>${pl}</option>`).join('')}
            <option value="__other__" ${isOtherBoot?'selected':''}>Other...</option>
          </select>
          <input id="boot-other-input" class="bonus-input" type="text" placeholder="Type name..."
            style="display:${isOtherBoot?'block':'none'}" value="${isOtherBoot?pb.boot:''}"
            ${tourneyLocked?'disabled':''} onchange="saveBonus('boot',this.value)">
        </div>
      </div>
      <div class="bonus-row">
        <span class="bonus-icon">🏆</span>
        <span class="bonus-label">Overall winner</span>
        <select class="bonus-input" ${tourneyLocked?'disabled':''} onchange="saveBonus('winner',this.value)">
          <option value="">Pick team...</option>
          ${WINNER_TEAMS.map(t=>`<option value="${t}" ${pb.winner===t?'selected':''}>${t}</option>`).join('')}
        </select>
      </div>
      <div class="bonus-row">
        <span class="bonus-icon">🌟</span>
        <span class="bonus-label">Young player of tourney</span>
        <div style="display:flex;flex-direction:column;gap:5px">
          <select class="bonus-input" ${tourneyLocked?'disabled':''} onchange="handleBallSelect(this.value)">
            <option value="">Pick player...</option>
            ${YOUNG_PLAYERS.map(pl=>`<option value="${pl}" ${pb.ball===pl?'selected':''}>${pl}</option>`).join('')}
            <option value="__other_ball__" ${(pb.ball && !YOUNG_PLAYERS.includes(pb.ball))?'selected':''}>Other...</option>
          </select>
          <input id="ball-other-input" class="bonus-input" type="text" placeholder="Type name..."
            style="display:${(pb.ball && !YOUNG_PLAYERS.includes(pb.ball))?'block':'none'}"
            value="${(pb.ball && !YOUNG_PLAYERS.includes(pb.ball))?pb.ball:''}"
            ${tourneyLocked?'disabled':''} onchange="saveBonus('ball',this.value)">
        </div>
      </div>
    </div>
  </div>`;

  // progress bar just above fixtures
  html += `<div class="card"><div class="card-body" style="padding:10px 14px">
    <div class="progress-labels"><span>${done} of ${total} picks made</span><span>${pct}%</span></div>
    <div class="progress-track"><div class="progress-fill" style="width:${pct}%"></div></div>
  </div></div>`;

  for(const [grp, fxs] of Object.entries(byGroup)) {
    html += `<div class="card"><div class="card-header"><div class="card-title"><span class="group-pill">GRP ${grp}</span></div></div><div class="card-body">`;
    for(const fx of fxs) {
      const locked = isLocked(fx);
      const pick   = pp[fx.id];
      const res    = DB.results[fx.id];
      const now3 = new Date();
      const fxKicked = now3 >= fx.ko;
      const isLive = fxKicked && now3 < new Date(fx.ko.getTime() + 2*60*60*1000) && !res;
      const dotCls = res ? 'dot-done' : isLive ? 'dot-live' : locked ? 'dot-locked' : 'dot-open';
      const meta   = isLive ? '' : locked&&!res?' · locked' : res?' · result in' : '';

      const btnCls = (val, isDraw=false) => {
        const isSelected = pick===val;
        let c = 'pick-btn';
        if(locked) c += ' locked';
        if(isSelected) {
          c += ' selected';
          if(res) {
            const ok = (res==='draw'&&isDraw) || (res!=='draw'&&res===val&&!isDraw);
            c += ok ? ' correct' : ' wrong';
          }
        }
        return c;
      };

      html += `<div class="fixture">
        <div>
          <div class="fixture-teams">${fx.h} vs ${fx.a}</div>
          <div class="fixture-meta"><span class="status-dot ${dotCls}"></span>${fx.date} · ${fx.ko.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit',timeZone:'Europe/London'})}${isLive?' · <span style="color:#ef4444;font-weight:600;font-size:10px">LIVE</span>':meta}</div>

        <button data-fx="${fx.id}" data-val="draw" class="${btnCls('draw',true)}" onclick="${locked?'':`pickFx('${fx.id}','draw')`}">Draw</button>
        <button class="${btnCls(fx.a)}" data-fx="${fx.id}" data-val="${fx.a}" onclick="${locked?'':`pickFx('${fx.id}','${fx.a}')`}">${shortName(fx.a)}</button>
      </div>`;
    }
    html += `</div></div>`;
  }
  document.getElementById('view-picks').innerHTML = html;
}

function showToast(msg, color) {
  let t = document.getElementById('save-toast');
  if(!t) {
    t = document.createElement('div');
    t.id = 'save-toast';
    t.style.cssText = 'position:fixed;bottom:80px;left:50%;transform:translateX(-50%);padding:8px 16px;border-radius:20px;font-size:12px;font-weight:600;font-family:DM Sans,sans-serif;z-index:999;transition:opacity 0.3s;pointer-events:none';
    document.body.appendChild(t);
  }
  t.textContent = msg;
  t.style.background = color || 'var(--pitch-dark)';
  t.style.color = '#fff';
  t.style.opacity = '1';
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.style.opacity = '0', 1500);
}

window.pickFx = async function(fxId, val) {
  if(!session) return;
  const key = session.player.replace(/[^a-zA-Z0-9]/g,'_');
  if(!DB.picks[session.player]) DB.picks[session.player]={};
  DB.picks[session.player][fxId] = val;

  // update DOM instantly without full re-render
  const fx = FIXTURES.find(f=>f.id===fxId);
  if(fx) {
    const btns = document.querySelectorAll(`[data-fx="${fxId}"]`);
    btns.forEach(btn => {
      btn.classList.remove('selected','correct','wrong');
      if(btn.dataset.val === val) btn.classList.add('selected');
    });
    // update progress bar
    const done = Object.keys(DB.picks[session.player]).length;
    const pct = Math.round(done/FIXTURES.length*100);
    const fill = document.querySelector('.progress-fill');
    const labels = document.querySelectorAll('.progress-labels span');
    if(fill) fill.style.width = pct+'%';
    if(labels[0]) labels[0].textContent = done+' of '+FIXTURES.length+' picks made';
    if(labels[1]) labels[1].textContent = pct+'%';
  }

  // save to Firebase in background
  fbSet('picks/'+key+'/'+fxId, val).catch(() => showToast('⚠ Save failed — check your connection', '#dc2626'));
};

window.saveBonus = async function(field, val) {
  if(!session || !val) return;
  const key = session.player.replace(/[^a-zA-Z0-9]/g,'_');
  if(!DB.bonuses[session.player]) DB.bonuses[session.player]={};
  DB.bonuses[session.player][field] = val;
  await fbSet(`bonuses/${key}/${field}`, val);
};

window.handleBootSelect = function(val) {
  const inp = document.getElementById('boot-other-input');
  if(val==='__other__') { inp.style.display='block'; inp.focus(); saveBonus('boot',''); }
  else { inp.style.display='none'; saveBonus('boot', val); }
};

window.handleBallSelect = function(val) {
  const inp = document.getElementById('ball-other-input');
  if(val==='__other_ball__') { inp.style.display='block'; inp.focus(); saveBonus('ball',''); }
  else { inp.style.display='none'; saveBonus('ball', val); }
};

// ── knockout picks ───────────────────────────────────────────────────────
function renderKnockout() {
  const p = session.player;
  const now = new Date();
  const koPicks = DB.knockout[p] || {};
  const koResults = (DB.knockout._results) || {};
  let html = '';

  // show admin message banner if active
  const adminMsgKo = DB.adminMessage || '';
  if(adminMsgKo) {
    const linkedMsg = adminMsgKo.replace(/(https?:\/\/[^\s]+|[a-zA-Z0-9.-]+\.[a-zA-Z]{2,}\/[^\s]*)/g,
      url => {
        const href = url.startsWith('http') ? url : 'https://'+url;
        return `<a href="${href}" target="_blank" style="color:#f0c040;text-decoration:underline">${url}</a>`;
      });
    html += `<div style="background:var(--pitch-dark);color:#fff;border-radius:var(--radius-sm);padding:12px 14px;margin-bottom:12px">
      <span style="font-size:13px;font-weight:500">${linkedMsg}</span>
    </div>`;
  }

  // ── Qualification wildcards (locks 11 Jun) ───────────────────────────────
  const qualLocked = now >= new Date("2026-06-11T20:00:00Z");
  const qualResults = koResults._qual || {};
  const myWildcards = koPicks._wildcards || {};
  const picksComplete = Object.keys(DB.picks[p] || {}).length === FIXTURES.length;

  const standings = simulateGroups(DB.picks[p] || {});
  const autoQualified = [];
  const thirdPlaced = [];
  for(const [grp, ranked] of Object.entries(standings)) {
    if(ranked[0]) autoQualified.push({team:ranked[0].team, grp, pos:1, pts:ranked[0].pts});
    if(ranked[1]) autoQualified.push({team:ranked[1].team, grp, pos:2, pts:ranked[1].pts});
    if(ranked[2]) thirdPlaced.push({team:ranked[2].team, grp, pts:ranked[2].pts});
  }
  thirdPlaced.sort((a,b) => b.pts - a.pts);
  const thirdPlacedTeams = thirdPlaced.map(t => t.team);

  // also include any 4th-place teams tied on points with their group's 3rd-place team
  for(const [grp, ranked] of Object.entries(standings)) {
    const third = ranked[2];
    const fourth = ranked[3];
    if(third && fourth && fourth.pts === third.pts && fourth.pts > 0) {
      if(!thirdPlaced.find(t => t.team === fourth.team)) {
        thirdPlaced.push({team: fourth.team, grp, pts: fourth.pts});
        thirdPlacedTeams.push(fourth.team);
      }
    }
  }
  thirdPlaced.sort((a,b) => b.pts - a.pts);

  // auto-clean stale wildcard picks - ONLY if all 72 group picks are made and not yet locked
  const picksLoadedWork = Object.keys(DB.picks[p] || {}).length === FIXTURES.length;
  if(session && DB.knockout[session.player] && picksLoadedWork && !qualLocked) {
    const rawWcForClean = (DB.knockout[session.player]._wildcards) || {};
    const stale = Object.entries(rawWcForClean).filter(([team, picked]) => {
      if(!picked) return false;
      const tNorm = team.replace(/_/g,' ');
      return !thirdPlacedTeams.includes(team) && !thirdPlacedTeams.includes(tNorm);
    });
    if(stale.length) {
      const key = session.player.replace(/[^a-zA-Z0-9]/g,'_');
      stale.forEach(([team]) => {
        delete DB.knockout[session.player]._wildcards[team];
        // Use same key format as pickWildcard save: only replace Firebase-forbidden chars
        const teamKey = team.replace(/[^a-zA-Z0-9]/g,'_');
        fbSet('knockout/'+key+'/_wildcards/'+teamKey, null);
      });
    }
  }

  // only count wildcards that are still in the current 3rd place list (match by normalised name)
  const wildcardCount = Object.entries(myWildcards).filter(([team, picked]) => {
    if(!picked) return false;
    const tNorm = team.replace(/_/g,' ');
    return thirdPlacedTeams.includes(team) || thirdPlacedTeams.includes(tNorm);
  }).length;

  html += `<div class="card">
    <div class="card-header">
      <div class="card-title">Who qualifies from groups?</div>
      <div style="display:flex;align-items:center;gap:8px">
        <span style="font-size:11px;font-weight:600;padding:2px 8px;border-radius:20px;background:${qualLocked?'#fff7ed':'#f0fdf4'};color:${qualLocked?'#c2410c':'var(--success)'}">
          ${qualLocked?'Locked':'Locks 11 Jun 20:00'}
        </span>
        <span style="font-size:11px;color:var(--text-muted)">wildcards 1pt each</span>
      </div>
    </div>
    <div class="card-body">`;

  if(!picksComplete) {
    html += `<div style="background:var(--warning-bg);border:1px solid #fde68a;border-radius:6px;padding:10px 12px;font-size:13px;color:var(--warning)">
      ⚠️ Complete all your group stage picks first — this section auto-fills based on your predicted results.
    </div>`;
  } else {
    html += `<div style="margin-bottom:14px">
      <div style="font-size:12px;font-weight:700;color:var(--pitch-dark);text-transform:uppercase;letter-spacing:0.4px;margin-bottom:6px">
        📋 Predicted to qualify from your picks (24 teams — for reference only)
      </div>
      <div style="font-size:12px;color:var(--text-muted);margin-bottom:8px">
        Based on your group stage picks, these 24 teams finish 1st or 2nd. No points for this — it's just showing you who you've already predicted to go through.
      </div>
      <div style="display:flex;flex-wrap:wrap;gap:5px">`;
    autoQualified.forEach(({team, grp, pos}) => {
      html += `<span style="padding:4px 10px;border-radius:20px;font-size:11px;font-weight:500;
        background:#f0fdf4;color:var(--pitch-dark);border:1px solid #bbf7d0">
        ${team} <span style="opacity:0.6">${pos===1?'🥇':'🥈'} Grp ${grp}</span>
      </span>`;
    });
    html += `</div></div>`;

    html += `<div>
      <div style="font-size:12px;font-weight:700;color:var(--pitch-dark);text-transform:uppercase;letter-spacing:0.4px;margin-bottom:4px">
        🃏 Pick your 8 wildcards (${wildcardCount}/8 selected)
      </div>
      <div style="font-size:12px;color:var(--text-muted);margin-bottom:8px">
        These 12 teams finish 3rd in their group based on your picks, ranked by predicted points.
        Pick the 8 you think qualify as wildcards — <strong>1pt each correct</strong>.
        Note: goal difference also matters in reality, so higher predicted points = more likely to qualify.
      </div>
      <div style="display:flex;flex-wrap:wrap;gap:5px">`;

    thirdPlaced.forEach(({team, grp, pts}) => {
      const picked = myWildcards[team] || false;
      const confirmed = qualResults[team];
      let cls = 'pick-btn';
      if(qualLocked) cls += ' locked';
      if(picked) {
        cls += ' selected';
        const allConfirmed = Object.keys(qualResults).length >= 32;
        if(allConfirmed) cls += confirmed ? ' correct' : ' wrong';
      }
      const isValidPick = thirdPlacedTeams.includes(team);
      const atMax = wildcardCount >= 8 && !picked;
      html += `<button class="${cls}" style="width:auto;padding:6px 12px;font-size:12px;${atMax?'opacity:0.4;cursor:not-allowed':''}"
        data-wc-team="${team.replace(/"/g,'&quot;')}"
        onclick="${(qualLocked||atMax) ? '' : 'pickWildcardByEl(this)'}">
        ${team} <span style="opacity:0.6;font-size:10px">${pts}pts · Grp ${grp}</span>
      </button>`;
    });

    html += `</div>`;
    if(wildcardCount === 8 && !qualLocked) {
      html += `<div style="background:#f0fdf4;border:1px solid #bbf7d0;border-radius:6px;padding:8px 12px;font-size:12px;color:var(--success);margin-top:8px">
        ✅ 8/8 wildcards selected — deselect one to change your picks.
      </div>`;
    }
    html += `<div style="font-size:12px;color:var(--text-muted);margin-top:10px;padding-top:10px;border-top:1px solid var(--border)">
      Total predicted to qualify: <strong>${autoQualified.length + wildcardCount}/32</strong>
    </div>`;

    // 4th place finishers - collapsible
    const fourthPlaced = [];
    for(const [grp, teams] of Object.entries(ALL_TEAMS_BY_GROUP)) {
      const grpStandings = standings[grp] || [];
      if(grpStandings[3] && !thirdPlacedTeams.includes(grpStandings[3].team)) fourthPlaced.push({team:grpStandings[3].team, grp, pts:grpStandings[3].pts});
    }
    if(fourthPlaced.length) {
      html += `<div style="margin-top:10px;border-top:1px solid var(--border);padding-top:8px">
        <div onclick="toggleSection('fourth-place')" style="cursor:pointer;display:flex;align-items:center;justify-content:space-between">
          <div style="font-size:12px;font-weight:600;color:var(--text-muted)">4th place finishers — check your picks</div>
          <span style="font-size:11px;color:var(--text-muted)">▼</span>
        </div>
        <div id="fourth-place" style="display:none;margin-top:8px">
          <div style="font-size:11px;color:var(--text-muted);margin-bottom:6px">These teams are predicted to finish 4th in their group based on your picks — they can't qualify as wildcards.</div>
          <div style="display:flex;flex-wrap:wrap;gap:5px">`;
      fourthPlaced.forEach(({team, grp, pts}) => {
        html += `<span style="padding:4px 10px;border-radius:20px;font-size:11px;background:var(--offwhite);color:var(--text-muted);border:1px solid var(--border);text-decoration:line-through">
          ${team} <span style="opacity:0.6">${pts}pts · Grp ${grp}</span>
        </span>`;
      });
      html += `</div></div></div>`;
    }

    html += `</div>`;
  }
  html += `</div></div>`;

  // ── Round by round team selection ────────────────────────────────────────
  for(const rk of ROUND_KEYS) {
    const round = KNOCKOUT_ROUNDS[rk];
    const now2 = new Date();
    const isOpen = now2 >= round.opensAfter;
    const isLocked = now2 >= round.firstKo;
    const myPicks = koPicks[rk] || {};
    const roundResults = koResults[rk] || {};
    const qualified = DB.knockout._qualified && DB.knockout._qualified[rk] ? DB.knockout._qualified[rk] : {};
    const pickCount = Object.values(myPicks).filter(Boolean).length;
    const available = Object.keys(qualified).filter(k => qualified[k]);

    const openDate = round.opensAfter.toLocaleDateString('en-GB',{day:'numeric',month:'short'});
    const openTime = round.opensAfter.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit',timeZone:'Europe/London'});

    else if(isLocked) { statusBg='#fff7ed'; statusColor='#c2410c'; statusText='Locked'; }
    else {
      const lockDate = round.firstKo.toLocaleDateString('en-GB',{day:'numeric',month:'short'});
      const lockTime = round.firstKo.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit',timeZone:'Europe/London'});
      statusBg='#f0fdf4'; statusColor='var(--success)'; statusText='Locks '+lockDate+' '+lockTime+' BST';

    const lockDateFmt = round.firstKo.toLocaleDateString('en-GB',{day:'numeric',month:'short'});

    html += `<div class="card">

        ? Object.values(ALL_TEAMS_BY_GROUP).flat()
        : available;

      const pct = Math.round(pickCount/round.teamsToQualify*100);
      const isCollapsed = rk === 'r16';
      const collapseId = 'ko-collapse-'+rk;

      // header with progress + collapse toggle for r16
      html += `<div style="padding:8px 14px 4px;cursor:pointer" onclick="toggleSection('${collapseId}')">

          <span>${pct}%</span>
        </div>
        <div class="progress-track"><div class="progress-fill" style="width:${pct}%"></div></div>

function simulateGroups(playerPicks) {
  const standings = {};
  for(const [grp, teams] of Object.entries(ALL_TEAMS_BY_GROUP)) {
    const pts = {};
    teams.forEach(t => pts[t] = 0);
    FIXTURES.filter(fx => fx.g === grp).forEach(fx => {
      const pick = playerPicks[fx.id];
      if(!pick) return;
      if(pick === fx.h) { pts[fx.h] += 3; }
      else if(pick === 'draw') { pts[fx.h] += 1; pts[fx.a] += 1; }
      else if(pick === fx.a) { pts[fx.a] += 3; }
    });
    standings[grp] = teams.slice().sort((a,b) => (pts[b]||0) - (pts[a]||0))
      .map(t => ({team:t, pts:pts[t]||0}));
  }
  return standings;
}

window.pickWildcard = async function(team, picked) {
  if(!session) return;
  const key = session.player.replace(/[^a-zA-Z0-9]/g,'_');
  // Use same full-underscore key format consistently for all saves/deletes
  const teamKey = team.replace(/[^a-zA-Z0-9]/g,'_');
  if(!DB.knockout[session.player]) DB.knockout[session.player] = {};
  if(!DB.knockout[session.player]._wildcards) DB.knockout[session.player]._wildcards = {};
  // Local DB always keyed by display name (normaliser handles the mapping on load)
  const currentlyPicked = DB.knockout[session.player]._wildcards[team] || false;
  const standings2 = simulateGroups(DB.picks[session.player] || {});
  const thirdPlaced2 = [];
  for(const [grp, ranked] of Object.entries(standings2)) {
    if(ranked[2]) thirdPlaced2.push(ranked[2].team);
    if(ranked[2] && ranked[3] && ranked[3].pts === ranked[2].pts && ranked[3].pts > 0) thirdPlaced2.push(ranked[3].team);
  }
  const allTeamsFlatCap = Object.values(ALL_TEAMS_BY_GROUP).flat();
  const toDisplayCap = k => allTeamsFlatCap.find(t => t.replace(/[^a-zA-Z0-9]/g,'_') === k) || k.replace(/_/g,' ');
  const validCount = Object.entries(DB.knockout[session.player]._wildcards).filter(([t, v]) => {
    if(!v) return false;
    return thirdPlaced2.includes(t) || thirdPlaced2.includes(toDisplayCap(t));
  }).length;
  if(!currentlyPicked && validCount >= 8) return;
  const newVal = !currentlyPicked;
  DB.knockout[session.player]._wildcards[team] = newVal;
  // Write null (not false) on deselect so Firebase removes the key entirely
  fbSet('knockout/'+key+'/_wildcards/'+teamKey, newVal || null).catch(() => showToast('⚠ Save failed — check your connection', '#dc2626'));
  renderKnockout();
};

window.pickKoTeam = async function(roundKey, team, picked) {
  if(!session) return;
  const key = session.player.replace(/[^a-zA-Z0-9]/g,'_');
  const teamKey = team.replace(/[^a-zA-Z0-9]/g,'_');
  if(!DB.knockout[session.player]) DB.knockout[session.player] = {};
  if(!DB.knockout[session.player][roundKey]) DB.knockout[session.player][roundKey] = {};
  const currentlyPicked = DB.knockout[session.player][roundKey][team] || false;
  // hard cap - block new picks at max, always allow deselection
  const round2 = KNOCKOUT_ROUNDS[roundKey];
  const currentCount = Object.values(DB.knockout[session.player][roundKey]).filter(Boolean).length;
  if(!currentlyPicked && round2 && currentCount >= round2.teamsToQualify) return;
  const newVal = !currentlyPicked;
  DB.knockout[session.player][roundKey][team] = newVal;
  fbSet('knockout/'+key+'/'+roundKey+'/'+teamKey, newVal).catch(() => showToast('⚠ Save failed — check your connection', '#dc2626'));

  // update DOM directly - don't re-render and collapse
  const btns = document.querySelectorAll(`[onclick*="pickKoTeam('${roundKey}','${team.replace(/'/g,"\\'")}"]`);
  btns.forEach(btn => {
    if(newVal) btn.classList.add('selected');
    else btn.classList.remove('selected','correct','wrong');
  });

  // update pick count and progress bar
  const myPicks = DB.knockout[session.player][roundKey];
  const pickCount = Object.values(myPicks).filter(Boolean).length;
  const round = KNOCKOUT_ROUNDS[roundKey];
  const collapseId = 'ko-collapse-'+roundKey;
  const progressSpan = document.querySelector(`#${collapseId} .progress-labels span, #${collapseId} + div span`);
  // update the header progress text above the collapse div
  const headerDiv = document.getElementById(collapseId)?.previousElementSibling;
  if(headerDiv) {
    const spans = headerDiv.querySelectorAll('span');
    if(spans[0]) spans[0].textContent = pickCount+'/'+round.teamsToQualify+' picked · tap to expand';
    const pct = Math.round(pickCount/round.teamsToQualify*100);
    const fill = headerDiv.querySelector('.progress-fill');
    if(fill) fill.style.width = pct+'%';
  }
};

window.deletePlayer = async function(playerKey) {
  const displayName = playerKey.replace(/_/g,' ');

  // Remove from Firebase
  await Promise.all([
    fbSet('pins/'+playerKey, null),
    fbSet('picks/'+playerKey, null),
    fbSet('bonuses/'+playerKey, null),
    fbSet('paid/'+playerKey, null),
    fbSet('knockout/'+playerKey, null),
  ]);

  // Remove from local DB
  delete DB.pins[playerKey];
  delete DB.picks[displayName];
  delete DB.picks[playerKey];
  delete DB.bonuses[displayName];
  delete DB.bonuses[playerKey];
  delete DB.paid[playerKey];

    delete DB.knockout[playerKey];

  renderAdmin();

window.toggleRoundQualified = async function(roundKey, team, qualified) {
  const teamKey = team.replace(/[^a-zA-Z0-9]/g,'_');
  if(!DB.knockout._qualified) DB.knockout._qualified = {};
  if(!DB.knockout._qualified[roundKey]) DB.knockout._qualified[roundKey] = {};
  if(qualified) {
    DB.knockout._qualified[roundKey][team] = true;
    await fbSet('knockout/_qualified/'+roundKey+'/'+teamKey, true);
  } else {
    delete DB.knockout._qualified[roundKey][team];
    await fbSet('knockout/_qualified/'+roundKey+'/'+teamKey, null);
    const laterRounds = ROUND_KEYS.slice(ROUND_KEYS.indexOf(roundKey) + 1);
    for(const lr of laterRounds) {
      if(DB.knockout._qualified[lr] && DB.knockout._qualified[lr][team]) {
        delete DB.knockout._qualified[lr][team];
        await fbSet('knockout/_qualified/'+lr+'/'+teamKey, null);
      }
    }
  }
  renderAdmin();
};

window.toggleQualResult = async function(team, qualified) {

window.fetchBracket = async function() {
  const btn = document.getElementById('fetch-bracket-btn');
  const status = document.getElementById('fetch-bracket-status');
  btn.disabled = true;
  btn.textContent = '📋 Fetching bracket...';
  status.textContent = 'Calling API-Football for knockout fixtures...';

  try {
    const res = await fetch(PROXY + '?league=1&season=2026&status=NS&round=Round%20of%2032');
    const data = await res.json();

    if(!data.response || !data.response.length) {
      status.innerHTML = '<span style="color:var(--warning)">No R32 fixtures found yet — try again after 27 June.</span>';
      btn.disabled = false;
      btn.textContent = '📋 Fetch bracket (available 27 June)';
      return;
    }

    // Clear existing R32 matches
    KNOCKOUT_ROUNDS.r32.matches = [];
    await fbSet('knockout/r32/matches', null);

    for(const match of data.response) {
      const home = TEAM_MAP[match.teams.home.name] || match.teams.home.name;
      const away = TEAM_MAP[match.teams.away.name] || match.teams.away.name;
      KNOCKOUT_ROUNDS.r32.matches.push({home, away});
    }

    // Save to Firebase
    await fbSet('knockout/r32/matches', KNOCKOUT_ROUNDS.r32.matches);
    if(!DB.knockout.r32) DB.knockout.r32 = {};
    DB.knockout.r32.matches = KNOCKOUT_ROUNDS.r32.matches;

    status.innerHTML = '<span style="color:var(--success)">✓ ' + KNOCKOUT_ROUNDS.r32.matches.length + ' R32 fixtures loaded</span>';
    btn.textContent = '📋 Fetch bracket (available 27 June)';
    btn.disabled = false;
    renderAdmin();

  } catch(e) {
    status.innerHTML = '<span style="color:var(--danger)">Error — check connection and try again.</span>';
    btn.disabled = false;
    btn.textContent = '📋 Fetch bracket (available 27 June)';
  }
};

window.fetchQualified = async function() {
  const btn = document.getElementById('fetch-qual-btn');
  const status = document.getElementById('fetch-qual-status');
  btn.disabled = true;
  btn.textContent = '📋 Fetching standings...';
  status.textContent = 'Calling API for group standings...';

  try {
    const res = await fetch(PROXY + '?league=1&season=2026&standings=true');
    const data = await res.json();

    if(!data.response || !data.response.length) {
      status.innerHTML = '<span style="color:var(--warning)">No standings found yet — try again after 27 June.</span>';
      btn.disabled = false; btn.textContent = '📋 Fetch qualified teams (available 27 June)';
      return;
    }

    let count = 0;
    if(!DB.knockout._results) DB.knockout._results = {};
    if(!DB.knockout._results._qual) DB.knockout._results._qual = {};

    for(const group of data.response) {
      const standings = group.league && group.league.standings ? group.league.standings[0] : [];
      standings.forEach((entry, idx) => {
        // top 2 automatically qualify
        if(idx < 2) {
          const team = TEAM_MAP[entry.team.name] || entry.team.name;
          DB.knockout._results._qual[team] = true;
          fbSet('knockout/_results/_qual/'+team.replace(/[^a-zA-Z0-9]/g,'_'), true);
          count++;
        }
      });
    }

    status.innerHTML = '<span style="color:var(--success)">✓ ' + count + ' qualified teams loaded — still tick the 8 wildcards manually once confirmed.</span>';
    btn.disabled = false; btn.textContent = '📋 Fetch qualified teams (available 27 June)';
    renderAdmin();

  } catch(e) {
    status.innerHTML = '<span style="color:var(--danger)">Error — check connection and try again.</span>';
    btn.disabled = false; btn.textContent = '📋 Fetch qualified teams (available 27 June)';
  }
};

// ── wildcard key normalisation ────────────────────────────────────────────
// Firebase keys can't contain . $ # [ ] / — replace those when saving.
// On load, remap back to display names so all lookups work correctly.
function normaliseKnockoutWildcards(koObj) {
  if(!koObj) return koObj;
  const allTeams = Object.values(ALL_TEAMS_BY_GROUP).flat();
  // Match both old key format (all non-alphanumeric → _) and new format (forbidden chars only → _)
  const fbToDisplay = fbKey => {
    return allTeams.find(t =>
      t.replace(/[.$#[\]/]/g,'_') === fbKey ||
      t.replace(/[^a-zA-Z0-9]/g,'_') === fbKey
    ) || allTeams.find(t => t.replace(/[^a-zA-Z0-9]/g,'_').replace(/__+/g,'_') === fbKey.replace(/__+/g,'_'))
    || fbKey;
  };

  // 1. Remap _qual keys (admin tick-off stored under underscore keys)
  if(koObj._results && koObj._results._qual) {
    const remappedQual = {};
    Object.entries(koObj._results._qual).forEach(([fbKey, val]) => {
      remappedQual[fbToDisplay(fbKey)] = val;
    });
    koObj._results._qual = remappedQual;
  }

  // 2. Remap _qualified round keys (e.g. r16, qf team names stored as underscores)
  if(koObj._qualified) {
    Object.keys(koObj._qualified).forEach(roundKey => {
      const roundNode = koObj._qualified[roundKey];
      if(!roundNode || typeof roundNode !== 'object') return;
      const remappedRound = {};
      Object.entries(roundNode).forEach(([fbKey, val]) => {
        if(!val) return;
        remappedRound[fbToDisplay(fbKey)] = val;
      });
      koObj._qualified[roundKey] = remappedRound;
    });
  }

  // 3. Remap each player's _wildcards keys, stripping any false values
  // (old code wrote false on deselect; Firebase should store null/remove but didn't)
  Object.keys(koObj).forEach(playerKey => {
    const playerNode = koObj[playerKey];
    if(!playerNode || typeof playerNode !== 'object') return;
    if(!playerNode._wildcards) return;
    const remapped = {};
    Object.entries(playerNode._wildcards).forEach(([fbKey, val]) => {
      if(!val) return; // strip false/null values
      remapped[fbToDisplay(fbKey)] = val;
    });
    playerNode._wildcards = remapped;
  });

  // 3. Add display-name aliases for player node keys stored with underscores
  Object.keys(koObj).forEach(k => {
    if(k.startsWith('_')) return;
    const display = k.replace(/_/g,' ');
    if(display !== k && !koObj[display]) koObj[display] = koObj[k];
  });

  return koObj;
}

const PROXY = typeof PROXY_URL !== 'undefined' ? PROXY_URL : '';

async function autoFetchResults() {
  if(!PROXY) {
    console.warn('PROXY not configured — auto-fetch disabled');
    return 0;
  }
  try {
    const res = await fetch(PROXY + '?league=1&season=2026&status=FT');
    const data = await res.json();
    if(!data.response || !data.response.length) return 0;
    let updated = 0;
    const TEAM_MAP = {};
    for(const match of data.response) {
      const home = TEAM_MAP[match.teams.home.name] || match.teams.home.name;
      const away = TEAM_MAP[match.teams.away.name] || match.teams.away.name;
      const homeGoals = match.goals.home;
      const awayGoals = match.goals.away;
      let result;
      if(homeGoals > awayGoals) result = home;
      else if(awayGoals > homeGoals) result = away;
      else result = 'draw';
      const fx = FIXTURES.find(f => f.h === home && f.a === away);
      if(fx && DB.results[fx.id] !== result) {
        DB.results[fx.id] = result;
        await fbSet('results/'+fx.id, result);
        updated++;
      }
    }
    return updated;
  } catch(e) {
    console.error('autoFetchResults error:', e);
    return 0;
  }
}


// ── one-time cleanup: purge false wildcard values left by old code ────────
async function purgeStaleWildcardFalseValues() {
  const ko = await fbGet('knockout') || {};
  for(const [playerKey, playerNode] of Object.entries(ko)) {
    if(playerKey.startsWith('_') || !playerNode || typeof playerNode !== 'object') continue;
    if(!playerNode._wildcards) continue;
    for(const [teamKey, val] of Object.entries(playerNode._wildcards)) {
      if(val === false || val === null) {
        await fbSet('knockout/'+playerKey+'/_wildcards/'+teamKey, null);
      }
    }
  }
  console.log('[WC26] Stale wildcard cleanup complete');
}
